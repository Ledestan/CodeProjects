version: '3.8'
services:
  mysql:
    image: mysql:8.0
    # 强制指定平台，防止Mac M1/M2报错
    platform: linux/amd64
    environment:
      MYSQL_ROOT_PASSWORD: 123456
      MYSQL_DATABASE: team_db  # 自动创建库
    ports:
      - "3306:3306"
    volumes:
      # 关键：第一次启动时，自动执行init.sql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
      # 持久化本地数据，避免每次重启都要重新导入（提升启动速度）
      - ./mysql_data:/var/lib/mysql