{% extends "base.html" %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
    <h2><i class="fas fa-users-cog me-2"></i>用户管理</h2>
    <a href="{{ url_for('auth.register') }}" class="btn btn-primary">
        <i class="fas fa-user-plus"></i> 添加用户
    </a>
</div>

<table class="table table-striped table-hover">
    <thead>
        <tr>
            <th>ID</th>
            <th>用户名</th>
            <th>角色</th>
            <th>操作</th>
        </tr>
    </thead>
    <tbody>
        {% for user in users %}
        <tr>
            <td>{{ user.id }}</td>
            <td>{{ user.username }}</td>
            <td>{{ user.role }}</td>
            <td>
                <a href="{{ url_for('auth.edit_user_role', user_id=user.id) }}" class="btn btn-sm btn-warning me-1">
                    <i class="fas fa-pen"></i> 编辑角色
                </a>
                <a href="{{ url_for('auth.reset_user_password', user_id=user.id) }}" class="btn btn-sm btn-info me-1">
                    <i class="fas fa-key"></i> 修改密码
                </a>
                {% if user != current_user %}
                <form action="{{ url_for('auth.delete_user', user_id=user.id) }}" method="POST" style="display:inline;">
                    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                    <button type="submit" class="btn btn-sm btn-danger" onclick="return confirm('确定要删除用户 {{ user.username }} 吗？');">
                        <i class="fas fa-trash"></i> 删除
                    </button>
                </form>
                {% endif %}
            </td>
        </tr>
        {% endfor %}
    </tbody>
</table>
{% endblock %}
