<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>行旅识景</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #f0f2f5 0%, #e0e5ec 100%);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }
        .container {
            text-align: center;
        }
        .container h1 {
            font-size: 56px;
            color: #1f2a3a;
            margin-bottom: 8px;
            font-weight: 600;
            letter-spacing: 2px;
        }
        .container p {
            font-size: 18px;
            color: #6a7a8e;
            margin-bottom: 40px;
        }
        .btn {
            display: inline-block;
            padding: 16px 56px;
            background: #0066ff;
            color: white;
            font-size: 22px;
            font-weight: 500;
            border-radius: 40px;
            text-decoration: none;
            transition: background 0.3s, transform 0.2s;
            box-shadow: 0 4px 12px rgba(0,102,255,0.3);
        }
        .btn:hover {
            background: #0052cc;
            transform: scale(1.02);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>行旅识景</h1>
        <p>世界著名地标智能识别 · 轻量AI交互平台</p>
        <a href="/app" class="btn">进入</a>
    </div>
</body>
</html>
